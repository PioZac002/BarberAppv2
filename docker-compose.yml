services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: barberapp
      POSTGRES_USER: barberapp
      POSTGRES_PASSWORD: barberapp_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Init scripts run once on first start (only when the data volume is empty)
      - ./backend/db/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./backend/db/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barberapp -d barberapp"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend (Express + Node) ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  # ── Frontend (React → nginx) ───────────────────────────────────────────────
  frontend:
    build:
      context: .
      args:
        VITE_API_URL: http://localhost:3000
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
